name: Data Loader Check

on:
  push:
  pull_request:

jobs:
  data-loader:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate dataset loader
        run: python3 data/loader.py

